<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Simple</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(270deg, #cf0f79, #0dc1ce, #667eea);
      background-size: 600% 600%;
      animation: gradient 5s ease infinite;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    .button-link {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 24px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.4s ease-in-out;
      z-index: 10;
    }
    .button-link.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      display: block;
    }
    #video.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="button-link" onclick="showVideo()">! Truc trop cool !</button>

    <video id="video" muted playsinline loop>
      <source src="Wallpaper Liink Spike.mp4" type="video/mp4">
      Ton navigateur ne supporte pas la vidéo.
    </video>
  </div>

  <script>
    function playSound() {
      const audio = new Audio('heyliink.ogg');
      audio.volume = 0.5;
      audio.play().catch(err => console.log('Erreur audio:', err));
    }
    
    function showVideo() {
      playSound();

      const btn = document.querySelector('.button-link');
      const video = document.getElementById('video');

      btn.classList.add('hidden');
      video.classList.add('show');

      video.play().catch(err => console.log('Erreur vidéo:', err));
    }
  </script>
</body>
</html>
