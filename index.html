<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Simple</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(270deg, #cf0f79, #0dc1ce, #667eea);
      background-size: 600% 600%;
      animation: gradient 5s ease infinite;
      position: relative;
    }
    @keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
    }
    .container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    .button-link {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 24px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.4s ease-in-out;
      z-index: 10;
    }
    .button-link:hover {
      background: #0056b3;
    }
    .button-link.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #image {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      display: block;
    }
    #image.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="button-link" onclick="showImage()">! Truc trop cool !</button>
    <img id="image" src="Minecraft Screenshot 2025.05.25 - 23.29.39.72.png" alt="Image">
  </div>
  
  <script>
    function playSound() {
      const audio = new Audio('amoug-us.mp3');
      audio.volume = 0.5;
      audio.play().catch(err => console.log('Erreur audio:', err));
    }
    
    function showImage() {
      playSound();
      const btn = document.querySelector('.button-link');
      const img = document.getElementById('image');
      btn.classList.add('hidden');
      img.classList.add('show');
    }
  </script>
</body>
</html>
